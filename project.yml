name: LogCam
options:
  bundleIdPrefix: com.zh6xk
targets:
  LogCam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
      - Camera
      - ColorScience
      - Recording
      - UI
      - Resources
    info:
      path: App/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "Aplikasi membutuhkan akses kamera untuk merekam video log."
        NSMicrophoneUsageDescription: "Aplikasi membutuhkan akses mikrofon untuk merekam audio."
        NSPhotoLibraryAddUsageDescription: "Aplikasi menyimpan video hasil rekaman ke galeri."

